<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oficina - Ordens de Serviço</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

<div class="container py-4 max-w-custom">
    <h2 class="text-center mb-4">Nova Ordem de Serviço</h2>

    <!-- Seção 1: Busca pela Placa -->
    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <label for="placaBusca" class="form-label fw-bold">Placa do Veículo</label>
            <div class="input-group input-group-lg">
                <input type="text" id="placaBusca" class="form-control text-uppercase" placeholder="ABC-1234">
                <button class="btn btn-primary" id="btnBuscarPlaca" type="button">Buscar</button>
            </div>
            <div id="alertaBusca" class="mt-2"></div>
        </div>
    </div>

    <!-- Seção 2: Formulário da OS (Escondido até a busca) -->
    <form id="formOS" class="d-none">
        
        <!-- Dados do Cliente e Carro -->
        <div class="card shadow-sm mb-3">
            <div class="card-header bg-secondary text-white">Dados do Cliente</div>
            <div class="card-body">
                <div class="mb-3">
                    <label class="form-label">Nome do Cliente</label>
                    <input type="text" id="nomeCliente" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Modelo do Carro</label>
                    <input type="text" id="modeloCarro" class="form-control" required>
                </div>
                <!-- Histórico (Se for cliente antigo) -->
                <div id="areaHistorico" class="d-none alert alert-info p-2">
                    <p class="mb-1 fw-bold">Cliente já possui histórico!</p>
                    <button type="button" class="btn btn-sm btn-outline-info w-100 bg-white">Ver Ordens Anteriores</button>
                </div>
            </div>
        </div>

        <!-- Dados do Serviço -->
        <div class="card shadow-sm mb-3">
            <div class="card-header bg-secondary text-white">Detalhes do Serviço</div>
            <div class="card-body">
                <div class="row">
                    <div class="col-6 mb-3">
                        <label class="form-label">KM Entrada</label>
                        <input type="number" id="kmEntrada" class="form-control" required>
                    </div>
                    <div class="col-6 mb-3">
                        <label class="form-label">KM Saída</label>
                        <input type="number" id="kmSaida" class="form-control">
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Descrição do que foi feito</label>
                    <textarea id="descricao" class="form-control" rows="3" required></textarea>
                </div>
            </div>
        </div>

<!-- Fechamento e Comissão -->
        <div class="card shadow-sm mb-4">
            <div class="card-header bg-secondary text-white">Faturamento e Repasse</div>
            <div class="card-body">
                <div class="mb-3">
                    <label class="form-label">Valor Cobrado do Cliente (R$)</label>
                    <input type="number" id="valorTotal" step="0.01" class="form-control form-control-lg text-success fw-bold" required>
                </div>
                <div class="row">
                    <div class="col-6 mb-3">
                        <label class="form-label text-primary">Repasse Carlos (R$)</label>
                        <input type="number" id="repasseCarlos" step="0.01" class="form-control" placeholder="0.00">
                    </div>
                    <div class="col-6 mb-3">
                        <label class="form-label text-primary">Repasse Ratinho (R$)</label>
                        <input type="number" id="repasseRatinho" step="0.01" class="form-control" placeholder="0.00">
                    </div>
                </div>
                <div class="form-text mt-0">Deixe zerado se não houver repasse para um dos dois. O restante do valor fica para a oficina.</div>
            </div>
        </div>

        <button type="submit" class="btn btn-success btn-lg w-100 mb-5">Salvar Ordem de Serviço</button>
    </form>
</div>

<!-- Scripts modulares (Firebase v9) -->
<script type="module" src="app.js"></script>
</body>
</html>
